apiVersion: v1
kind: Service
metadata:
  name: devops-api
spec:
  selector:
    app: devops-api
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
      - name: devops-api
        image: karabalta75/api-app:1.0.0
        ports:
        - containerPort: 3001
        readinessProbe:
          httpGet:
            path: /api/status
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/status
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 20        
        env:
        - name: DBUSER
          valueFrom:  
            configMapKeyRef:
              name: devops-api-config
              key: DBUSER
        - name: DB
          valueFrom:
            configMapKeyRef:
              name: devops-api-config
              key: DB
        - name: DBPASS
          valueFrom:
            secretKeyRef:
              name: devops-api-secret
              key: DBPASS
        - name: DBHOST
          valueFrom:
            configMapKeyRef:
              name: devops-api-config
              key: DBHOST
        - name: DBPORT
          valueFrom:
            configMapKeyRef:
              name: devops-api-config
              key: DBPORT
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-api-config
data:
  DBUSER: devops_user
  DB: devops_db
  DBHOST: mysql
  DBPORT: "3306"
  PORT: "3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: devops-api-secret
type: Opaque
data:
  DBPASS: cGFzc3dvcmQ= # base64 encoded value of "password"